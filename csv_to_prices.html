<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CSV → prices.js</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6fb;padding:30px;color:#111}.box{max-width:760px;margin:auto;background:#fff;border-radius:12px;padding:24px;box-shadow:0 8px 30px #0002}h1{margin-top:0;color:#1a3a6b}input,button{font-size:16px;padding:10px;margin-top:10px}button{background:#1a3a6b;color:#fff;border:0;border-radius:6px;cursor:pointer}.hint{color:#555;line-height:1.5}.ok{margin-top:15px;color:#176b35;font-weight:bold}.err{margin-top:15px;color:#b00020;font-weight:bold}code{background:#eef2ff;padding:2px 5px;border-radius:4px}</style>
</head>
<body>
<div class="box">
<h1>CSV → prices.js</h1>
<p class="hint">Загрузите CSV из Google Sheets. Нужны колонки <code>code</code> и <code>price</code>. Файл не отправляется в интернет — обработка идёт прямо в браузере.</p>
<input type="file" id="file" accept=".csv,text/csv"><br>
<button onclick="convert()">Создать prices.js</button>
<div id="msg"></div>
</div>
<script>
function parseCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){
      if(q && line[i+1]==='"'){cur+='"'; i++;} else q=!q;
    } else if((c===',' || c===';' || c==='\t') && !q){out.push(cur.trim()); cur='';}
    else cur+=c;
  }
  out.push(cur.trim()); return out;
}
function convert(){
  const f=document.getElementById('file').files[0], msg=document.getElementById('msg');
  if(!f){msg.className='err';msg.textContent='Выберите CSV файл.';return;}
  const r=new FileReader();
  r.onload=()=>{
    try{
      const lines=String(r.result).replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim());
      const header=parseCSVLine(lines[0]).map(x=>x.toLowerCase().replace(/^"|"$/g,''));
      const ci=header.indexOf('code'), pi=header.indexOf('price');
      if(ci<0||pi<0) throw new Error('Нет колонок code и price');
      const prices={};
      for(let i=1;i<lines.length;i++){
        const row=parseCSVLine(lines[i]);
        const code=(row[ci]||'').replace(/^"|"$/g,'').trim();
        const price=Number((row[pi]||'').replace(/^"|"$/g,'').replace(',','.').trim());
        if(code && Number.isFinite(price)) prices[code]=price;
      }
      const js='// Local price overrides generated from CSV\nconst PRICES = '+JSON.stringify(prices,null,2)+';\n';
      const blob=new Blob([js],{type:'text/javascript;charset=utf-8'});
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='prices.js'; a.click();
      msg.className='ok'; msg.textContent='Готово: создан prices.js, записей: '+Object.keys(prices).length;
    }catch(e){msg.className='err';msg.textContent='Ошибка: '+e.message;}
  };
  r.readAsText(f,'utf-8');
}
</script>
</body>
</html>
